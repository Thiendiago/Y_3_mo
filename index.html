<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chúc mừng 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:linear-gradient(#0b0b1f,#1a1a40);
overflow:hidden;
text-align:center;
color:white;
font-family:'Poppins',sans-serif;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:2;
}

.gift{
width:150px;
height:150px;
background:#ff4d6d;
position:relative;
margin:auto;
cursor:pointer;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
transition:transform 0.3s;
}

.gift:hover{
transform:scale(1.05);
}

.ribbon-h{
position:absolute;
width:100%;
height:35px;
background:#ffd166;
top:60px;
}

.ribbon-v{
position:absolute;
width:35px;
height:100%;
background:#ffd166;
left:60px;
}

.lid{
width:160px;
height:40px;
background:#ff758f;
position:absolute;
top:-40px;
left:-5px;
border-radius:10px;
transition:0.6s;
}

.open .lid{
transform:rotate(-25deg) translateY(-25px);
}

.message{

display:none;
margin-top:40px;
font-size:38px;
font-family:'Dancing Script',cursive;
line-height:1.6;
color:#fff;

text-shadow:
0 0 10px #ff4d6d,
0 0 20px #ff4d6d,
0 0 30px #ff99aa;

animation:fade 2s;
}

@keyframes fade{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

.heart{
position:absolute;
color:#ff4d6d;
font-size:20px;
animation:fly 5s linear infinite;
}

@keyframes fly{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-700px);opacity:0;}
}

.petal{
position:absolute;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px) rotate(0deg);}
100%{transform:translateY(100vh) rotate(360deg);}
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="container">

<div class="gift" id="gift" onclick="openGift()">

<div class="lid"></div>
<div class="ribbon-h"></div>
<div class="ribbon-v"></div>

</div>

<div class="message" id="msg">

🌸 Chúc mừng ngày Quốc tế Phụ nữ 8/3 🌸  
<br>
Chúc bạn luôn xinh đẹp, hạnh phúc  
<br>
và tràn đầy yêu thương ❤️

</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-love-11741.mp3" type="audio/mpeg">
</audio>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

class Particle{

constructor(x,y,color){

this.x=x
this.y=y
this.color=color

let angle=Math.random()*Math.PI*2
let speed=Math.random()*6

this.vx=Math.cos(angle)*speed
this.vy=Math.sin(angle)*speed

this.life=100

}

update(){

this.x+=this.vx
this.y+=this.vy
this.vy+=0.03
this.life--

}

draw(){

ctx.beginPath()
ctx.arc(this.x,this.y,2,0,Math.PI*2)
ctx.fillStyle=this.color
ctx.fill()

}

}

function firework(x,y){

const colors=["#ff4d6d","#ffd166","#06d6a0","#118ab2","#ef476f","#f72585"]

for(let i=0;i<120;i++){

particles.push(new Particle(x,y,colors[Math.floor(Math.random()*colors.length)]))

}

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.update()
p.draw()

if(p.life<=0){
particles.splice(i,1)
}

})

requestAnimationFrame(animate)

}

animate()

function startFireworks(){

setInterval(()=>{

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

firework(x,y)

},700)

}

function openGift(){

document.getElementById("gift").classList.add("open")

document.getElementById("msg").style.display="block"

document.getElementById("music").play()

startFireworks()

createHearts()

}

function createHearts(){

setInterval(()=>{

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*window.innerWidth+"px"
heart.style.top=window.innerHeight+"px"

heart.style.fontSize=(20+Math.random()*30)+"px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),5000)

},600)

}

function createPetals(){

setInterval(()=>{

let p=document.createElement("div")

p.className="petal"
p.innerHTML="🌸"

p.style.left=Math.random()*window.innerWidth+"px"
p.style.animationDuration=(5+Math.random()*5)+"s"

document.body.appendChild(p)

setTimeout(()=>p.remove(),10000)

},400)

}

createPetals()

</script>

</body>
</html>
