<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chúc mừng 8/3</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:linear-gradient(#0b0b1f,#1a1a40);
overflow:hidden;
text-align:center;
color:white;
font-family:'Poppins',sans-serif;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:2;
}

.gift{
width:150px;
height:150px;
background:#ff4d6d;
position:relative;
margin:auto;
cursor:pointer;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
transition:transform 0.3s;
}

.gift:hover{
transform:scale(1.05);
}

.ribbon-h{
position:absolute;
width:100%;
height:35px;
background:#ffd166;
top:60px;
}

.ribbon-v{
position:absolute;
width:35px;
height:100%;
background:#ffd166;
left:60px;
}

.lid{
width:160px;
height:40px;
background:#ff758f;
position:absolute;
top:-40px;
left:-5px;
border-radius:10px;
transition:0.6s;
}

.open .lid{
transform:rotate(-25deg) translateY(-25px);
}

.message{

display:none;
margin-top:40px;
font-size:38px;
font-family:'Dancing Script',cursive;
line-height:1.6;
color:#fff;

text-shadow:
0 0 10px #ff4d6d,
0 0 20px #ff4d6d,
0 0 30px #ff99aa;

animation:fade 2s;
}

@keyframes fade{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
